<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD TATTOO | Next-Gen</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage/dist/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eef2ff', 500: '#6366f1', 600: '#4f46e5', 900: '#312e81' },
                        slate: { 950: '#020617' }
                    }
                }
            }
        }
    </script>

    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.7); --glass-border: rgba(255, 255, 255, 0.6); }
        .dark { --glass-bg: rgba(15, 23, 42, 0.8); --glass-border: rgba(255, 255, 255, 0.08); }

        body {
            background: radial-gradient(circle at top left, #f8fafc, #e2e8f0);
            min-height: 100vh;
            transition: all 0.5s ease;
        }
        body.dark { background: radial-gradient(circle at top left, #0f172a, #020617); }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
            border-radius: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .dark .glass-card { box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { transform: translateY(-2px); }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-8">
        
        <header class="glass-card p-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-brand-600 p-3 rounded-2xl shadow-lg shadow-brand-500/30">
                    <i data-lucide="layout-dashboard" class="text-white w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-800 text-slate-900 dark:text-white tracking-tight">DASHBOARD <span class="text-brand-600">TATTOO</span></h1>
                    <p class="text-xs font-medium text-slate-500 dark:text-slate-400">Next-Gen Project Analytics</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="healthBadge" class="hidden px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" id="healthPing"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3" id="healthDot"></span>
                    </span>
                    <span id="healthText">Analyse...</span>
                </div>

                <div class="h-8 w-[1px] bg-slate-200 dark:bg-slate-800 mx-2"></div>

                <button id="themeToggle" class="p-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm">
                    <i data-lucide="sun" class="w-5 h-5 text-amber-500 hidden dark:block"></i>
                    <i data-lucide="moon" class="w-5 h-5 text-slate-700 block dark:hidden"></i>
                </button>

                <label class="group relative cursor-pointer bg-brand-600 hover:bg-brand-700 text-white px-5 py-3 rounded-xl font-bold transition shadow-xl shadow-brand-500/20 flex items-center gap-2">
                    <i data-lucide="file-up" class="w-5 h-5"></i>
                    <span>Importer Excel</span>
                    <input type="file" id="excelUpload" accept=".xlsx, .csv" class="hidden">
                </label>
            </div>
        </header>

        <div id="loadingOverlay" class="hidden glass-card p-8 text-center animate-pulse">
            <div class="w-full bg-slate-200 dark:bg-slate-800 h-2 rounded-full mb-4 overflow-hidden">
                <div id="loader-bar" class="bg-brand-600 h-full w-0 transition-all duration-300"></div>
            </div>
            <p class="text-slate-600 dark:text-slate-400 font-bold">Traitement des données TATTOO...</p>
        </div>

        <main id="dashboard" class="hidden space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="glass-card p-8 flex flex-col items-center">
                    <div class="w-full flex justify-between mb-6">
                        <span class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Avancement Global</span>
                        <i data-lucide="target" class="w-5 h-5 text-brand-500"></i>
                    </div>
                    <div class="relative w-44 h-44">
                        <canvas id="chartAvancement"></canvas>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="valAvancement" class="text-4xl font-800 text-slate-800 dark:text-white">0%</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-8 flex flex-col items-center">
                    <div class="w-full flex justify-between mb-4">
                        <span class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Consommation Effort</span>
                        <i data-lucide="timer" class="w-5 h-5 text-emerald-500"></i>
                    </div>
                    
                    <div class="mb-4 text-center">
                        <span id="valEffort" class="text-2xl font-800 text-slate-800 dark:text-white">0 / 0 JH</span>
                    </div>

                    <div class="relative w-56 h-28">
                        <canvas id="chartEffort"></canvas>
                    </div>
                </div>

                <div class="glass-card p-8 relative overflow-hidden group">
                    <div class="w-full flex justify-between mb-6">
                        <span class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Dette Planning</span>
                        <i data-lucide="alert-circle" class="w-5 h-5 text-rose-500"></i>
                    </div>
                    <div class="flex flex-col items-center">
                        <span id="valDette" class="text-7xl font-800 text-rose-500 tracking-tighter">0</span>
                        <p class="text-slate-400 font-bold mt-2">JH de retard cumulés</p>
                    </div>
                </div>
            </div>

            <div class="glass-card p-8">
                <div class="flex items-center gap-3 mb-8">
                    <div class="p-2 bg-indigo-100 dark:bg-indigo-900/30 rounded-lg">
                        <i data-lucide="users" class="text-brand-600 w-6 h-6"></i>
                    </div>
                    <h2 class="text-xl font-800 text-slate-800 dark:text-white uppercase tracking-tight">Charge par Collaborateur (JH)</h2>
                </div>
                <div class="relative w-full" id="workloadContainer">
                    <canvas id="chartWorkload"></canvas>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-8">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-800 text-rose-600 flex items-center gap-2">
                            <i data-lucide="clock" class="w-5 h-5"></i> Retards
                        </h2>
                        <span id="countRetard" class="bg-rose-100 dark:bg-rose-900/30 text-rose-600 px-3 py-1 rounded-full text-xs font-bold">0</span>
                    </div>
                    <div class="max-h-96 overflow-y-auto custom-scroll pr-2 space-y-4" id="listRetard"></div>
                </div>

                <div class="glass-card p-8">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-800 text-emerald-600 flex items-center gap-2">
                            <i data-lucide="calendar-check" class="w-5 h-5"></i> Prochains Jalons
                        </h2>
                        <span id="countJalons" class="bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 px-3 py-1 rounded-full text-xs font-bold">0</span>
                    </div>
                    <div class="max-h-96 overflow-y-auto custom-scroll pr-2 space-y-4" id="listJalons"></div>
                </div>
            </div>
        </main>

        <footer class="flex justify-between items-center px-6 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
            <div>Engine TATTOO v2.2 (Links Secured)</div>
            <button id="clearData" class="hover:text-rose-500 transition">Réinitialiser Cache</button>
        </footer>
    </div>

    <script>
        lucide.createIcons();
        let charts = {};

        // Theme Toggle Logic
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateChartsColors();
        });
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

        function updateChartsColors() {
            const isDark = document.documentElement.classList.contains('dark');
            Chart.defaults.color = isDark ? '#94a3b8' : '#64748b';
            Chart.defaults.borderColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
            Object.values(charts).forEach(c => c.update());
        }

        // --- MOTEUR DATA (Sécurisé & Anti-404) ---
        const cleanStr = str => (str || '').toString().toLowerCase().trim();
        
        function parseTime(val) {
            if (!val) return 0;
            if (typeof val === 'number') return val > 0 && val < 1 ? val * 24 : val;
            return parseFloat(val.toString().replace(',', '.')) || 0;
        }

        function parseDate(val) {
            if (!val) return null;
            if (typeof val === 'number') return new Date(Math.round((val - 25569) * 86400 * 1000));
            let d = new Date(val);
            return isNaN(d.getTime()) ? null : d;
        }

        async function processTattooExcel(workbook) {
            let sheets = workbook.SheetNames.map(name => {
                let data = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
                return { name, data };
            });

            const taskSheet = sheets.find(s => s.data.length > 0 && (s.data[0]['Statut'] || s.data[0]['Status']));
            const workloadSheet = sheets.find(s => s.data.length > 0 && Object.keys(s.data[0]).some(k => k.includes('effort')));

            let validTasks = [];
            if (taskSheet) {
                taskSheet.data.forEach(row => {
                    let title = row['Nom'] || row['Title'] || row['Nom de la tâche'] || '';
                    let parent = row['Projet ou dossier'] || row['Folder'] || row['Parent task'] || '';
                    let status = cleanStr(row['Statut'] || row['Status'] || '');
                    
                    if ([title, parent].some(v => v.toString().toLowerCase().includes('tattoo')) && !status.includes('annul') && !status.includes('cancel')) {
                        
                        // --- FIX LIENS WRIKE (Anti-404 & Robustesse) ---
                        let taskIdRaw = row['ID'] || row['Key'] || row['Id'] || '';
                        let taskId = taskIdRaw.toString().trim().replace(/\s+/g, ''); // Nettoyage de l'ID

                        let linkRaw = row['Permalink'] || row['Lien permanent'] || row['URL'] || row['Lien'] || '';
                        let link = linkRaw.toString().trim();

                        // Validation du lien (doit commencer par http pour éviter les chemins relatifs locaux sur GitHub Pages)
                        if (link && !link.startsWith('http')) {
                            link = ''; 
                        }

                        // Logique de secours absolue
                        if (!link && taskId) {
                            link = `https://www.wrike.com/open.htm?id=${taskId}`;
                        } else if (!link) {
                            link = '#'; // Sécurité ultime
                        }

                        validTasks.push({
                            title,
                            link: link,
                            isDone: ['terminé', 'completed', 'validated', 'fini'].some(s => status.includes(s)),
                            effortJH: parseTime(row['Effort'] || row['Durée (Hours)'] || row['Effort (Hours)']) / 8,
                            spentJH: parseTime(row['Temps passé'] || row['Time Spent'] || row['Time Spent (Hours)']) / 8,
                            endDate: parseDate(row['Date d’échéance'] || row['End Date']),
                            user: row['Chargé de mission'] || row['Assigned To'] || row['Utilisateur'] || 'Non assigné'
                        });
                    }
                });
            }

            let workload = [];
            if (workloadSheet) {
                let agg = {};
                workloadSheet.data.forEach(row => {
                    const projectName = row['Project name'] || row['Projet'] || '';
                    const effortRaw = row['Total allocated effort (h)'] || row['Effort'] || 0;
                    const name = row['Assignee'] || row['Utilisateur'] || '';

                    if (projectName.toUpperCase().includes("TATTOO") && name && effortRaw > 0) {
                        agg[name] = (agg[name] || 0) + (parseTime(effortRaw) / 8);
                    }
                });
                workload = Object.keys(agg).map(k => ({ name: k, jh: +agg[k].toFixed(1) })).sort((a,b) => b.jh - a.jh);
            }

            return { tasks: validTasks, workload };
        }

        // --- RENDERING ---
        function renderDashboard(data) {
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            const now = new Date();
            let jhPlanned = 0, jhSpent = 0, done = 0, retardJH = 0;
            let retards = [], jalons = [];

            data.tasks.forEach(t => {
                jhPlanned += t.effortJH;
                jhSpent += t.spentJH;
                if (t.isDone) done++;

                if (t.endDate && !t.isDone) {
                    const diff = (t.endDate - now) / (1000 * 3600 * 24);
                    if (diff < 0) {
                        retardJH += Math.abs(diff);
                        retards.push(t);
                    } else if (diff < 45) {
                        jalons.push(t);
                    }
                }
            });

            // Update UI Numbers
            document.getElementById('valAvancement').innerText = `${Math.round((done/data.tasks.length)*100) || 0}%`;
            document.getElementById('valEffort').innerText = `${jhSpent.toFixed(1)} / ${jhPlanned.toFixed(1)} JH`;
            document.getElementById('valDette').innerText = Math.round(retardJH);

            // Health Status
            const badge = document.getElementById('healthBadge');
            badge.classList.remove('hidden');
            const isAlert = (jhSpent > jhPlanned * 1.1) || retardJH > 40;
            badge.className = `px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 ${isAlert ? 'bg-rose-100 dark:bg-rose-900/30 text-rose-600' : 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600'}`;
            document.getElementById('healthText').innerText = isAlert ? "Alerte Dérive" : "TATTOO Nominal";
            document.getElementById('healthDot').className = `relative inline-flex rounded-full h-3 w-3 ${isAlert ? 'bg-rose-500' : 'bg-emerald-500'}`;

            // Listes
            renderList('listRetard', retards.sort((a,b) => a.endDate - b.endDate));
            renderList('listJalons', jalons.sort((a,b) => a.endDate - b.endDate));
            document.getElementById('countRetard').innerText = retards.length;
            document.getElementById('countJalons').innerText = jalons.length;

            initCharts(done, data.tasks.length - done, jhSpent, jhPlanned, data.workload);

            gsap.from(".glass-card", { duration: 0.7, y: 20, opacity: 0, stagger: 0.08, ease: "power2.out" });
        }

        function renderList(id, tasks) {
            const container = document.getElementById(id);
            container.innerHTML = tasks.length ? '' : '<p class="text-slate-400 text-sm italic">Aucun élément détecté</p>';
            
            tasks.slice(0, 20).forEach(t => {
                const dateStr = t.endDate ? t.endDate.toLocaleDateString('fr-FR', {day:'2-digit', month:'short'}) : 'N/C';
                
                // Rendu des liens avec sécurité _blank et noopener
                container.innerHTML += `
                    <div class="flex items-center justify-between p-4 bg-white/40 dark:bg-slate-800/40 rounded-2xl border border-white/20 hover:bg-white/80 dark:hover:bg-slate-700/80 transition-all group">
                        <div class="flex-1 min-w-0 pr-4">
                            <a href="${t.link}" target="_blank" rel="noopener noreferrer" 
                               class="text-sm font-bold text-slate-800 dark:text-slate-200 truncate block group-hover:text-brand-600 group-hover:underline">
                                ${t.title}
                            </a>
                            <p class="text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-tighter">${t.user}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-800 text-slate-600 dark:text-slate-400">${dateStr}</span>
                            <div class="text-[10px] font-bold text-brand-500">${t.effortJH.toFixed(1)} JH</div>
                        </div>
                    </div>
                `;
            });
        }

        function initCharts(done, ongoing, spent, planned, workloadData) {
            const isDark = document.documentElement.classList.contains('dark');
            const bg = isDark ? '#1e293b' : '#f1f5f9';

            if(charts.av) charts.av.destroy();
            charts.av = new Chart(document.getElementById('chartAvancement'), {
                type: 'doughnut',
                data: { datasets: [{ data: [done, ongoing], backgroundColor: ['#4f46e5', bg], borderWidth: 0, cutout: '80%' }] },
                options: { plugins: { tooltip: {enabled: false} } }
            });

            if(charts.ef) charts.ef.destroy();
            charts.ef = new Chart(document.getElementById('chartEffort'), {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: spent > planned ? [planned, 0, spent-planned] : [spent, planned-spent, 0],
                        backgroundColor: ['#10b981', bg, '#f43f5e'],
                        borderWidth: 0, cutout: '80%', rotation: -90, circumference: 180
                    }]
                }
            });

            if(charts.wl) charts.wl.destroy();
            const canvasWl = document.getElementById('chartWorkload');
            canvasWl.parentNode.style.height = `${workloadData.length * 40 + 60}px`;
            charts.wl = new Chart(canvasWl, {
                type: 'bar',
                data: {
                    labels: workloadData.map(w => w.name),
                    datasets: [{ label: 'JH', data: workloadData.map(w => w.jh), backgroundColor: '#6366f1', borderRadius: 6, barThickness: 20 }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold' } } },
                        y: { grid: { display: false }, ticks: { font: { weight: 'bold' } } }
                    }
                }
            });
            updateChartsColors();
        }

        // --- FILE HANDLING ---
        document.getElementById('excelUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            const reader = new FileReader();
            reader.onload = async (evt) => {
                const bstr = evt.target.result;
                const wb = XLSX.read(bstr, { type: 'binary' });
                const data = await processTattooExcel(wb);
                await localforage.setItem('tattoo_store', data);
                renderDashboard(data);
            };
            reader.readAsBinaryString(file);
        });

        window.addEventListener('load', async () => {
            const cached = await localforage.getItem('tattoo_store');
            if (cached) renderDashboard(cached);
        });

        document.getElementById('clearData').addEventListener('click', async () => {
            await localforage.clear();
            location.reload();
        });
    </script>
</body>
</html>
